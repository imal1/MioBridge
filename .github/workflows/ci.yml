name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (oxlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.30

      - run: bun install

      - run: bun run lint

  typecheck:
    name: Type Check
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.30

      - run: bun install

      - run: bun run core:typecheck

      - run: bun run cli:typecheck

      - run: bun run typecheck

  test:
    name: Tests
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.30

      - run: bun install

      - run: bun run core:test

      - run: bun run --cwd packages/frontend test

      - run: bun run --cwd agent test

  cli:
    name: CLI tests + release archives
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.30


      - run: bun run cli:typecheck

      - run: bun run cli:test

      - name: Build and inspect release archives
        env:
          MIOBRIDGE_RELEASE_VERSION: 0.0.0-ci
        run: |
          set -euo pipefail
          bun run cli:release
          for arch in x64 arm64; do
            archive="dist/cli-release/miobridge-0.0.0-ci-linux-$arch.tar.gz"
            test -f "$archive"
            tar -tzf "$archive" | sort | diff -u <(printf 'VERSION\nmiobridge\n') -
            mkdir -p "$RUNNER_TEMP/$arch"
            tar -xzf "$archive" -C "$RUNNER_TEMP/$arch"
            test -x "$RUNNER_TEMP/$arch/miobridge"
          done
          grep -F 'miobridge-0.0.0-ci-linux-x64.tar.gz' dist/cli-release/SHA256SUMS
          grep -F 'miobridge-0.0.0-ci-linux-arm64.tar.gz' dist/cli-release/SHA256SUMS

  build:
    name: Build (Vite SPA)
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.30

      - run: bun install

      - run: bun run build

      - name: Verify Vite bundle boundary
        run: |
          set -euo pipefail
          DIST=packages/frontend/dist
          test -f "$DIST/index.html"
          test -d "$DIST/assets"
          if rg -l '@miobridge/core|node:fs|node:child_process|MioBridgeCore' "$DIST" 2>/dev/null; then
            echo "Node-only marker found in client bundle" >&2
            exit 1
          fi
          echo "Bundle boundary clean"

  deploy:
    name: Deploy to Vercel
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build, cli, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://miobridge.vercel.app

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.30

      - name: Setup Vercel CLI
        run: bun add -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: bun run --cwd packages/frontend build

      - name: Deploy to Vercel
        run: |
          vercel deploy --prod --cwd packages/frontend \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes
