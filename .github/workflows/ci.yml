name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (oxlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.30

      - name: Install dependencies
        run: bun install

      - name: Run oxlint
        run: bun run lint

  typecheck:
    name: Type Check (tsc)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.30

      - name: Install dependencies
        run: bun install

      - name: Type-check core
        run: bun run core:typecheck

      - name: Type-check frontend
        run: bun run typecheck

  test:
    name: Tests (core, frontend, Agent)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.30

      - name: Install dependencies
        run: bun install

      - name: Test core
        run: bun run core:test

      - name: Test frontend
        run: bun run --cwd frontend test

      - name: Test Agent
        run: bun run --cwd agent test

  cli:
    name: CLI contracts and Linux release archives
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.30

      - name: Install dependencies
        run: bun install

      - name: Type-check and test CLI contracts
        run: |
          bun run cli:typecheck
          bun run cli:test

      - name: Build and inspect x64 and arm64 release archives
        env:
          MIOBRIDGE_RELEASE_VERSION: 0.0.0-ci
        run: |
          set -euo pipefail
          bun run cli:release
          for arch in x64 arm64; do
            archive="dist/cli-release/miobridge-0.0.0-ci-linux-$arch.tar.gz"
            test -f "$archive"
            tar -tzf "$archive" | sort | diff -u <(printf 'VERSION\nmiobridge\n') -
            mkdir -p "$RUNNER_TEMP/$arch"
            tar -xzf "$archive" -C "$RUNNER_TEMP/$arch"
            test -x "$RUNNER_TEMP/$arch/miobridge"
          done
          grep -F 'miobridge-0.0.0-ci-linux-x64.tar.gz' dist/cli-release/SHA256SUMS
          grep -F 'miobridge-0.0.0-ci-linux-arm64.tar.gz' dist/cli-release/SHA256SUMS

  build:
    name: Build (Next.js standalone)
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.30

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Verify standalone trace and browser boundary
        run: |
          set -euo pipefail
          STANDALONE=packages/packages/frontend/.next/standalone
          test -f "$STANDALONE/packages/packages/frontend/server.js"
          test -f "$STANDALONE/packages/core/dist/index.js"
          test -d "$STANDALONE/packages/packages/frontend/.next/static"
          if rg -l '@miobridge/core|MioBridgeCore|node:fs|node:child_process' packages/packages/frontend/.next/static; then
            echo "Node-only core marker found in a client bundle" >&2
            exit 1
          fi

      - name: Package dashboard provider artifact
        run: |
          set -euo pipefail
          bash scripts/package-dashboard-provider.sh "$RUNNER_TEMP/dashboard-provider"
          test -f "$RUNNER_TEMP/dashboard-provider/provider.json"
          test -f "$RUNNER_TEMP/dashboard-provider/artifact/packages/packages/frontend/server.js"
          node -e 'const fs = require("node:fs"); const manifest = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); if (manifest.schemaVersion !== 1 || manifest.entrypoint !== "packages/packages/frontend/server.js") process.exit(1)' "$RUNNER_TEMP/dashboard-provider/provider.json"

      - name: Smoke-test standalone compatibility URLs
        run: |
          set -euo pipefail
          export MIOBRIDGE_CONFIG_DIR="$RUNNER_TEMP/miobridge"
          export PORT=3101
          export HOSTNAME=127.0.0.1
          export NODE_ENV=production
          mkdir -p "$MIOBRIDGE_CONFIG_DIR/www"
          printf 'vless://standalone-smoke\n' > "$MIOBRIDGE_CONFIG_DIR/www/raw.txt"
          printf 'dmxlc3M6Ly9zdGFuZGFsb25lLXNtb2tlCg==\n' > "$MIOBRIDGE_CONFIG_DIR/www/subscription.txt"
          printf 'proxies: []\n' > "$MIOBRIDGE_CONFIG_DIR/www/clash.yaml"
          node packages/packages/frontend/.next/standalone/packages/packages/frontend/server.js > "$RUNNER_TEMP/standalone.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true; cat "$RUNNER_TEMP/standalone.log"' EXIT
          for attempt in {1..30}; do
            curl -fsS "http://127.0.0.1:$PORT/health" >/dev/null && break
            if [[ "$attempt" == 30 ]]; then exit 1; fi
            sleep 1
          done
          for path in subscription.txt clash.yaml raw.txt health; do
            curl -fsS "http://127.0.0.1:$PORT/$path" >/dev/null
          done
